name: PiWorker-OS Sovereign Deployment

on:
  workflow_run:
    workflows: ["PiWorker-OS Sovereign CI"]
    types:
      - completed

permissions:
  contents: read

jobs:
  secret-policy-validation:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: production
    env:
      TARGET_ENV: production
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      SOVEREIGN_AUTH_TOKEN: ${{ secrets.SOVEREIGN_AUTH_TOKEN }}
      AGENT_SYSTEM_SECRET: ${{ secrets.AGENT_SYSTEM_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate environment-specific secret policy
        run: bash .github/scripts/validate-secrets-policy.sh "$TARGET_ENV"

  deploy:
    runs-on: ubuntu-latest
    needs: secret-policy-validation
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Verify npm lockfile integrity
        run: npm ci --ignore-scripts --no-audit --no-fund --legacy-peer-deps

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to Vercel (Production)
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
