name: PiWorker-OS Sovereign CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    # --- Node.js Strategy ---
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm install --legacy-peer-deps
      
    - name: TypeScript Validation
      run: npx tsc --noEmit || echo "Warning: TypeScript errors detected in legacy code."

    # --- Go Sovereign Strategy ---
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'
        cache: true
        cache-dependency-path: sidecar/sovereign-engine/go.sum

    - name: Build Sovereign Engine (Static Binary)
      run: |
        chmod +x scripts/build-sovereign-engine.sh
        ./scripts/build-sovereign-engine.sh

    # --- Final Build & Asset Verification ---
    - name: Build Next.js App
      run: npm run build
