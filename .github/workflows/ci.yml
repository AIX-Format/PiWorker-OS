name: PiWorker-OS Sovereign CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build:
    name: Build & Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        # Pin action versions to a vetted release tag for supply-chain security and reproducible runs.
        uses: actions/checkout@v4

      - name: Setup Node.js
        # Pin action versions to a vetted release tag for supply-chain security and reproducible runs.
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      - name: Install dependencies
        run: npm install --ignore-scripts --no-audit --no-fund --legacy-peer-deps

      - name: Enforce npm audit policy (fail on high/critical)
        run: npm audit --audit-level=high --omit=dev

      - name: Targeted Performance SLO Profiling
        run: npm run profile:slo

      - name: Contract Sync Validation
        run: npm run contracts:check

      - name: Setup Go
        # Pin action versions to a vetted release tag for supply-chain security and reproducible runs.
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.10"
          cache-dependency-path: go.sum

      - name: Verify Go module integrity
        run: go mod verify

      - name: Enforce Go vulnerability policy
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Typecheck (Node)
        run: npm run typecheck

      - name: Build (Node)
        run: npm run build:sovereign

      - name: Build (Go CLI)
        run: npm run build:cli

      - name: Build Sovereign Engine (Go)
        run: |
          chmod +x scripts/build-sovereign-engine.sh
          ./scripts/build-sovereign-engine.sh

      - name: Secret scan (Secretlint)
        run: npx secretlint "**/*"

      - name: Vulnerability scan (Trivy)
        # Pin action versions to a vetted release tag for supply-chain security and reproducible runs.
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: table
          exit-code: 1

      - name: Artifact sanity checks
        run: |
          test -s bin/piworker-cli
          test -s bin/sovereign-engine
          test -f sidecar/sovereign-engine/Dockerfile

      - name: Validate deploy secrets/config
        id: validate_config
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          verdict="PASS"
          details="All required deployment secrets are configured."

          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            for key in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
              if [ -z "${!key}" ]; then
                verdict="FAIL"
                details="Missing required deploy secret: ${key}"
                break
              fi
            done
          else
            details="Skipped strict secret validation for non-main or PR context."
          fi

          echo "verdict=${verdict}" >> "$GITHUB_OUTPUT"
          echo "details=${details}" >> "$GITHUB_OUTPUT"

          if [ "$verdict" = "FAIL" ]; then
            echo "$details"
            exit 1
          fi

      - name: Generate release checklist
        id: checklist
        run: |
          readiness="READY"
          if [ "${{ steps.validate_config.outputs.verdict }}" != "PASS" ]; then
            readiness="BLOCKED"
          fi

          cat > release-checklist.md <<EOF
          # Release Checklist

          ## Passing test matrix
          - Node typecheck
          - Go build (CLI + sovereign engine)
          - Security scans (Secretlint + Trivy)
          - Targeted Performance SLO Profiling
          - Contract Sync Validation
          - Artifact sanity checks

          ## Secret/config validation result
          - Verdict: ${{ steps.validate_config.outputs.verdict }}
          - Details: ${{ steps.validate_config.outputs.details }}

          ## Deployment readiness verdict
          - ${readiness}
          EOF

      - name: Upload release checklist artifact
        # Pin action versions to a vetted release tag for supply-chain security and reproducible runs.
        uses: actions/upload-artifact@v4
        with:
          name: release-checklist
          path: release-checklist.md
          if-no-files-found: error

  e2e-real:
    name: e2e-real
    runs-on: ubuntu-latest
    needs: build
    if: ${{ secrets.SOVEREIGN_ENGINE_URL != '' && secrets.SOVEREIGN_AUTH_TOKEN != '' && secrets.AGENT_SYSTEM_SECRET != '' }}
    env:
      SOVEREIGN_ENGINE_URL: ${{ secrets.SOVEREIGN_ENGINE_URL }}
      SOVEREIGN_AUTH_TOKEN: ${{ secrets.SOVEREIGN_AUTH_TOKEN }}
      AGENT_SYSTEM_SECRET: ${{ secrets.AGENT_SYSTEM_SECRET }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      - name: Install dependencies
        run: npm install --ignore-scripts --no-audit --no-fund --legacy-peer-deps

      - name: Run real E2E suite
        run: node --test tests/e2e/sovereign-critical-path.e2e.test.mjs

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-real-artifacts-${{ github.run_id }}
          path: tests/e2e/artifacts/
          if-no-files-found: warn
          retention-days: 14

  gate-critical-merge:
    name: gate-critical-merge
    runs-on: ubuntu-latest
    needs: e2e-real
    if: always() && (github.base_ref == 'main' || github.ref == 'refs/heads/main')
    steps:
      - name: Enforce critical-branch merge gate
        run: |
          result="${{ needs.e2e-real.result }}"
          if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
            echo "Blocking merge: e2e-real ended with '${result}'."
            exit 1
          fi
          echo "Gate passed with e2e-real result: ${result}."

  # Tiered Test Gates (T1-T4) job removed: the test:tier1..tier4 and
  # playwright:install:chromium npm scripts never existed in package.json
  # so the job only passed when it was skipped behind a failing build.
  # Now that Build & Security Audit is green and Playwright was removed
  # along with the frontend, the placeholder job has been deleted. Reintroduce
  # a real test harness here if/when those tiers are actually authored.
